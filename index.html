<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapdolo</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { background-color: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; }
.section { text-align: center; padding: 60px 20px; animation: fadeIn 0.5s ease; }
input { padding: 16px 20px; margin: 8px; border-radius: 6px; border: 1px solid #333; background: #111; color: white; font-size: 16px; width: 320px; transition: all 0.3s ease; box-sizing: border-box; }
input:focus { outline: none; border-color: #00E5FF; box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.3); }
button { padding: 16px 32px; font-size: 16px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; margin: 8px; transition: all 0.2s ease; }
button:active { transform: scale(0.96); }

.btn-primary { background: #00E5FF; color: black; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }
.btn-primary:hover { background: #33ECFF; box-shadow: 0 6px 20px rgba(0, 229, 255, 0.5); transform: translateY(-2px); }
.btn-danger { background: #b2b2b2; color: black; } .btn-danger:hover { background: #fff; }
.btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; } .btn-secondary:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
.btn-auto { background: #1a1a1a; color: #00E5FF; border: 1px solid #00E5FF; } .btn-auto:hover { background: #00E5FF; color: black; }
.btn-warn { background: #e6b800; color: black; } .btn-success { background: #2ecc71; color: black; }
.btn-delete { background: transparent; border: 1px solid #888; color: #888; } .btn-delete:hover { border-color: #ff4d4d; color: #ff4d4d; }

.modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
.hidden { display: none !important; }
.user-card { background: #111; border: 1px solid #222; padding: 20px; margin: 10px auto; max-width: 500px; border-radius: 8px; text-align: left; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; transition: border-color 0.3s; }
.user-card:hover { border-color: #00E5FF; }
.user-info { flex-basis: 100%; margin-bottom: 10px; }
.user-info h4 { margin: 0 0 5px 0; color: #00E5FF; font-size: 18px; }
.user-info p { margin: 0; font-size: 13px; color: #888; }
.user-actions { display: flex; gap: 5px; flex-wrap: wrap; }
.user-actions button { padding: 8px 12px; font-size: 12px; margin: 0; border-radius: 4px; }

.logo-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; cursor: pointer; user-select: none; }
.logo-icon { width: 60px; height: 60px; background: #00E5FF; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(0, 229, 255, 0.4); transition: transform 0.3s, box-shadow 0.3s; }
.logo-icon::after { content: ''; border-left: 22px solid black; border-top: 14px solid transparent; border-bottom: 14px solid transparent; margin-left: 5px; }
.logo-container:hover .logo-icon { transform: scale(1.1); box-shadow: 0 0 40px rgba(0, 229, 255, 0.8); }
.logo-text { font-size: 56px; font-weight: 800; color: white; letter-spacing: -2px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

.source-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 40px; }
.source-btn { padding: 24px 36px; font-size: 20px; font-weight: bold; border-radius: 8px; min-width: 160px; letter-spacing: 1px; position: relative; overflow: hidden; }
.source-btn::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent); pointer-events: none; }

.tv-player-container { width: 100%; max-width: 1000px; margin: 20px auto; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: none; aspect-ratio: 16/9; }
#tv-player { width: 100%; height: 100%; background: black; object-fit: contain; }
#iptv-msg { color: #00E5FF; margin-top: 10px; font-weight: bold; }

.iptv-container { margin-top: 30px; background: #111; border-radius: 12px; padding: 20px; border: 1px solid #222; }
.search-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; align-items: center; }
.iptv-channels { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-height: 450px; overflow-y: auto; padding: 10px; }
.iptv-btn { padding: 12px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; background: #1a1a1a; color: white; border: 1px solid #333; cursor: pointer; transition: all 0.2s; }
.iptv-btn:hover { background: #00E5FF; border-color: #00E5FF; color: black; transform: scale(1.05); }

#site-iframe { width: 100%; height: 800px; border: none; margin-top: 20px; display: none; background: #000; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.nav-bar { background: rgba(10, 10, 10, 0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid #222; backdrop-filter: blur(10px); }

/* --- CORRECTIF TV / BOX ANDROID --- */
body.is-tv { zoom: 0.8; }
body.is-tv .nav-bar { padding: 5px 15px; }
body.is-tv .logo-text { font-size: 20px; }
body.is-tv .logo-icon { width: 25px; height: 25px; }
body.is-tv .logo-icon::after { border-left-width: 14px; border-top-width: 9px; border-bottom-width: 9px; margin-left: 3px; }
body.is-tv button { padding: 10px 15px; font-size: 14px; margin: 5px; }
body.is-tv .tv-player-container { width: 100%; height: auto; max-height: 70vh; }
body.is-tv #tv-player { width: 100%; height: auto; object-fit: contain; }
body.is-tv .iptv-btn { font-size: 12px; padding: 8px 15px; }
body.is-tv input { padding: 10px 15px; font-size: 14px; }

/* --- STYLES FOCUS POUR TELECOMMANDE (TV Seulement) --- */
body.is-tv *:focus { outline: 4px solid #00E5FF !important; outline-offset: -2px; z-index: 10; }
body.is-tv button:focus, body.is-tv a:focus { transform: scale(1.05); background-color: rgba(0, 229, 255, 0.2) !important; }
body.is-tv .iptv-btn:focus { background: #00E5FF !important; border-color: #00E5FF !important; color: black !important; transform: scale(1.15) !important; box-shadow: 0 0 15px rgba(0, 229, 255, 0.8) !important; }

/* --- PLEIN ÉCRAN TV (TV Seulement) --- */
body.is-tv .app-fullscreen #app-screen nav.nav-bar { display: none !important; }
