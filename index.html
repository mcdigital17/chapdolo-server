<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapdolo</title>
<style>
body { background-color: #0a0a0a; color: white; font-family: sans-serif; margin: 0; }
.section { text-align: center; padding: 40px 20px; }
input { padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-size: 18px; width: 300px; }
button { padding: 15px 40px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
.btn-primary { background: #00E5FF; color: black; font-weight: bold; }
.btn-danger { background: red; color: white; }
.btn-secondary { background: #333; color: white; }
.btn-auto { background: #9b59b6; color: white; }
.btn-warn { background: #f39c12; color: black; }
.btn-success { background: #2ecc71; color: black; }
.btn-delete { background: transparent; border: 1px solid red; color: red; }
.modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
.hidden { display: none !important; }
.user-card { background: #111; border: 1px solid #333; padding: 20px; margin: 10px auto; max-width: 500px; border-radius: 10px; text-align: left; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.user-info { flex-basis: 100%; margin-bottom: 10px; }
.user-info h4 { margin: 0 0 5px 0; color: #00E5FF; }
.user-info p { margin: 0; font-size: 14px; color: #aaa; }
.user-actions { display: flex; gap: 5px; flex-wrap: wrap; }
.user-actions button { padding: 8px 12px; font-size: 12px; margin: 0; }

/* STYLE NETFLIX */
.netflix-row { margin-bottom: 40px; padding-left: 20px; }
.netflix-row h2 { margin: 0 0 10px 0; font-size: 24px; color: #e5e5e5; }
.row-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; }
.row-scroll::-webkit-scrollbar { height: 8px; }
.row-scroll::-webkit-scrollbar-thumb { background: #00E5FF; border-radius: 4px; }
.movie-card { min-width: 150px; cursor: pointer; transition: transform 0.2s; border-radius: 8px; overflow: hidden; }
.movie-card:hover { transform: scale(1.08); }
.movie-card img { width: 100%; height: 225px; object-fit: cover; display: block; }
.movie-card p { margin: 5px 0 0 0; font-size: 12px; text-align: center; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#player-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 50; display: flex; flex-direction: column; }
.player-nav { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 60; }
#video-iframe { width: 100%; flex-grow: 1; border: none; }
</style>
</head>
<body>

<div id="login-screen" class="section">
<h1 id="main-logo" style="color:#00E5FF; font-size:60px; margin-bottom:20px; cursor:pointer; user-select:none;">CHAPDOLO</h1>
<p style="color:grey; font-size:20px; margin-bottom:40px;">Accès réservé</p>
<input type="text" id="login-user" placeholder="Nom d'utilisateur"><br>
<input type="password" id="login-pass" placeholder="Mot de passe"><br>
<button class="btn-primary" onclick="login()">Se Connecter</button>
<p id="login-error" style="color:red; margin-top:20px;"></p>
</div>

<div id="admin-modal" class="modal-bg hidden">
<div class="modal-box" style="background:#111; padding:40px; border-radius:12px; border:2px solid red; text-align:center;">
<h2 style="color:red; margin-top:0;">Accès Administrateur</h2>
<input type="password" id="admin-pass-modal" placeholder="Mot de passe Admin"><br>
<button class="btn-danger" onclick="verifyAdmin()">Valider</button>
<button class="btn-secondary" onclick="closeAdminModal()">Annuler</button>
</div>
</div>

<div id="admin-screen" class="section hidden">
<h1 style="color:#00E5FF; margin-bottom:30px;">Panneau Administrateur</h1>
<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
   <div style="background:#111; padding:20px; border-radius:10px; width: 300px;">
      <h3>Créer un accès</h3>
      <input type="text" id="new-username" placeholder="Nom d'utilisateur" style="width:220px;"><br>
      <input type="text" id="new-password" placeholder="Mot de passe" style="width:150px;">
      <button class="btn-auto" onclick="autoGenerate()">Auto</button><br>
      <button class="btn-primary" onclick="generateUser()">Créer l'accès</button>
      <p id="admin-message" style="color:yellow; font-size:14px; font-weight:bold;">En attente...</p>
   </div>
   <div style="background:#111; padding:20px; border-radius:10px; width: 600px;">
      <h3>Utilisateurs créés</h3>
      <button class="btn-secondary" onclick="loadUsers()" style="font-size:14px;">🔄 Rafraîchir</button>
      <div id="user-list" style="margin-top:10px; max-height: 400px; overflow-y: auto;"></div>
   </div>
</div>
<br>
<button class="btn-primary" onclick="showApp()">Accéder au Streaming</button>
<button class="btn-danger" onclick="logout()">Déconnexion</button>
</div>

<div id="app-screen" class="hidden">
<nav style="background:#111; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;">
<h1 style="color:#00E5FF; font-size:28px; margin:0;">CHAPDOLO</h1>
<div>
<button style="background:transparent; color:white; border:1px solid white; padding:10px 20px; border-radius:5px; cursor:pointer;" onclick="logout()">Déconnexion</button>
</div>
</nav>
<div style="padding-top: 20px;">
   <div id="movies-row" class="netflix-row"><h2>🎬 Films Populaires</h2><div class="row-scroll" id="movies-scroll"></div></div>
   <div id="series-row" class="netflix-row"><h2>📺 Séries Populaires</h2><div class="row-scroll" id="series-scroll"></div></div>
   <div id="anime-row" class="netflix-row"><h2>⚔️ Animes</h2><div class="row-scroll" id="anime-scroll"></div></div>
</div>
</div>

<div id="player-screen" class="hidden">
<div class="player-nav">
<h3 id="player-title" style="color:white; margin:0;">Lecture</h3>
<button class="btn-danger" onclick="closePlayer()">✕ Fermer</button>
</div>
<iframe id="video-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
</div>

<script>
let currentLoggedUser = '';

document.getElementById('main-logo').addEventListener('click', function() {
    let count = parseInt(this.dataset.clicks || 0); count++; this.dataset.clicks = count;
    clearTimeout(window.logoClickTimer);
    if (count >= 5) { this.dataset.clicks = 0; document.getElementById('admin-modal').classList.remove('hidden'); } 
    else { window.logoClickTimer = setTimeout(() => { this.dataset.clicks = 0; }, 2000); }
});

function verifyAdmin() { if (document.getElementById('admin-pass-modal').value === 'chapdel220605') { document.getElementById('admin-modal').classList.add('hidden'); document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.remove('hidden'); document.getElementById('admin-pass-modal').value = ''; loadUsers(); } else { alert('Mot de passe incorrect !'); } }
function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); document.getElementById('admin-pass-modal').value = ''; }

async function login() { const u = document.getElementById('login-user').value; const p = document.getElementById('login-pass').value; const e = document.getElementById('login-error'); e.style.color='yellow'; e.innerText='Connexion...'; try { const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) }); const d = await r.json(); if(d.success){currentLoggedUser=u; showApp();}else{e.style.color='red';e.innerText=d.message||'Erreur';} } catch(x){e.style.color='red';e.innerText='Réseau';} }

async function logout() { if(currentLoggedUser){try{await fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentLoggedUser})});}catch(e){} currentLoggedUser='';} document.getElementById('app-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('login-user').value=''; document.getElementById('login-pass').value=''; document.getElementById('login-error').innerText=''; }

function autoGenerate() { const c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"; let p=""; for(let i=0;i<8;i++) p+=c.charAt(Math.floor(Math.random()*c.length)); document.getElementById('new-password').value=p; }

async function generateUser() { const u=document.getElementById('new-username').value; const p=document.getElementById('new-password').value; const m=document.getElementById('admin-message'); m.style.color='yellow';m.innerText='Création...'; if(!u||!p){m.style.color='red';m.innerText='Remplissez tout.';return;} try { const r=await fetch('/api/generate-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminPassword:'chapdel220605',newUser:u,newPass:p})}); const d=await r.json(); if(d.success){m.style.color='#0f0';m.innerText='SUCCÈS !';document.getElementById('new-username').value='';document.getElementById('new-password').value='';loadUsers();}else{m.style.color='red';m.innerText=d.message||'Erreur';} } catch(e){m.style.color='red';m.innerText='Critique';} }

async function loadUsers() { const l=document.getElementById('user-list'); l.innerHTML='<p style="color:grey;">Chargement...</p>'; try { const r=await fetch('/api/get-users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminPassword:'chapdel220605'})}); const d=await r.json(); if(d.success&&d.users){ const us=d.users; const un=Object.keys(us); if(un.length===0){l.innerHTML='<p style="color:grey;">Aucun.</p>';return;} l.innerHTML=''; un.forEach(u=>{ const i=us[u]; const old=typeof i==='string'; const pass=old?i:i.pass; const blk=old?false:i.blocked; const act=old?false:i.active; const c=document.createElement('div'); c.className='user-card'; c.innerHTML=`<div class="user-info"><h4>${u}</h4><p>Mdp: ${pass} | ${blk?'<span style="color:red;">Bloqué</span>':'<span style="color:green;">Actif</span>'} | ${act?'<span style="color:orange;">En ligne</span>':'Hors ligne'}</p></div><div class="user-actions">${blk?`<button class="btn-success" onclick="manageUser('${u}','unblock')">Débloquer</button>`:`<button class="btn-warn" onclick="manageUser('${u}','block')">Bloquer</button>`} ${act?`<button class="btn-danger" onclick="manageUser('${u}','disconnect')">Déco</button>`:''} <button class="btn-delete" onclick="manageUser('${u}','delete')">Suppr</button></div>`; l.appendChild(c); }); } } catch(e){l.innerHTML='<p style="color:red;">Réseau</p>';} }

async function manageUser(u,a) { if(a==='delete') if(!confirm('Supprimer '+u+' ?')) return; try { const r=await fetch('/api/manage-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminPassword:'chapdel220605',username:u,action:a})}); const d=await r.json(); if(d.success) loadUsers(); else alert('Erreur'); } catch(e){alert('Réseau');} }

function showApp() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); loadCatalog(); }

// --- SYSTÈME NETFLIX (CINEMETA + EMBED) ---
async function loadCatalog() {
    loadRow('movie', 'top', 'movies-scroll');
    loadRow('series', 'top', 'series-scroll');
    // Pour les animes, Cinemeta n'a pas de catalogue officiel parfait, on ruse avec les séries
    loadRow('series', 'top', 'anime-scroll'); 
}

async function loadRow(type, catalog, elementId) {
    const scroll = document.getElementById(elementId);
    scroll.innerHTML = '<p style="color:grey;">Chargement...</p>';
    try {
        const res = await fetch(`https://v3-cinemeta.strem.io/catalog/${type}/${catalog}.json`);
        const data = await res.json();
        scroll.innerHTML = '';
        if(data.metas) {
            // Limiter à 20 pour le chargement rapide
            data.metas.slice(0, 20).forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<img src="${item.poster}" alt="${item.name}"><p>${item.name}</p>`;
                card.onclick = () => playVideo(item.id, item.name, type);
                scroll.appendChild(card);
            });
        }
    } catch(e) {
        scroll.innerHTML = '<p style="color:red;">Erreur de chargement</p>';
    }
}

function playVideo(imdbId, name, type) {
    const playerScreen = document.getElementById('player-screen');
    const videoIframe = document.getElementById('video-iframe');
    const playerTitle = document.getElementById('player-title');
    
    playerTitle.innerText = name;
    
    // On utilise un service d'Embed propre (comme LOKKE/VYPN)
    // Il lit la vidéo sans afficher le site oha.to et ses pubs !
    if(type === 'movie') {
        videoIframe.src = `https://vidsrc.xyz/embed/movie?imdb=${imdbId}`;
    } else {
        // Pour les séries, on lance le premier épisode par défaut
        videoIframe.src = `https://vidsrc.xyz/embed/tv?imdb=${imdbId}&season=1&episode=1`;
    }
    
    playerScreen.classList.remove('hidden');
}

function closePlayer() {
    document.getElementById('player-screen').classList.add('hidden');
    document.getElementById('video-iframe').src = ''; // Arrête la vidéo
}
</script>
</body>
</html>
